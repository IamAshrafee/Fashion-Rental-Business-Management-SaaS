version: '3.8'

# Development overrides — exposes ports for local access
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  postgres:
    ports:
      - '5432:5432'

  redis:
    ports:
      - '6379:6379'

  minio:
    ports:
      - '9000:9000'
      - '9001:9001'
